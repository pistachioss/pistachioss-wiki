# Hexo Configuration - Wiki Project

# Site
title: 向阳的知识库
subtitle: Wiki & Notes
description: 个人笔记和技术文档
keywords: 编程,笔记,文档
author: shineXGO
language: zh-CN
timezone: 'Asia/Shanghai'

# URL - 重要！必须设置为子路径
url: https://blog.xiangyang.xyz/wiki
root: /wiki/
permalink: :category/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
## 主题设置为 wixo
theme: wixo

# Deployment - 不需要配置，由主博客的 Actions 处理
deploy:
  type: ''